apiVersion: apps/v1
kind: Deployment
metadata:
    name: grafana-deployment-devops
spec:
    replicas: 2
    selector:
        matchLabels:
            app: grafana
    template:
        metadata:
            name: grafana-pod
            labels:
                app: grafana
        spec:
            containers:
                - name: grafana-container
                  image: grafana/grafana
                  ports:
                      - containerPort: 3000